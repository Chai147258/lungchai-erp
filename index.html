<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP V3 - ลุงชัย ไชโย พานิช</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React 18 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide React Icons (SVG inline) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .icon-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simple Icon Components
        const ChevronDown = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        );

        const Plus = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        );

        const Edit2 = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
            </svg>
        );

        const Trash2 = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                <line x1="10" y1="11" x2="10" y2="17"></line>
                <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
        );

        const Download = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
        );

        const Upload = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
        );

        const X = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        );

        const Search = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
        );

        const ERPApp = () => {
            const [currentModule, setCurrentModule] = useState('dashboard');
            const [allData, setAllData] = useState({
                company: [],
                branch: [],
                employee: [],
                customer: [],
                supplier: [],
                product: [],
                service: [],
                lead: [],
                quotation: [],
                salesorder: [],
                delivery: [],
                stockin: [],
                stockout: [],
                workorder: [],
                invoice: [],
                payment: [],
                department: [],
                position: []
            });
            
            const [searchTerm, setSearchTerm] = useState('');
            const [editingItem, setEditingItem] = useState(null);
            const [showForm, setShowForm] = useState(false);
            const [formData, setFormData] = useState({});

            useEffect(() => {
                const sampleData = {
                    company: [
                        { id: 1, code: 'CY001', nameEN: 'Lungchai Chaiyo Panich', nameTH: 'ลุงชัย ไชโย พานิช', taxid: '0205500000', status: 'Active' }
                    ],
                    branch: [
                        { id: 'B01', code: 'BR001', name: 'สำนักงานใหญ่ (หนองใหญ่)', province: 'Chon Buri', status: 'Active' },
                        { id: 'B02', code: 'BR002', name: 'สาขาที่ 2 (ชลบุรี เมือง)', province: 'Chon Buri', status: 'Active' }
                    ],
                    employee: [
                        { id: 1, code: 'EMP001', name: 'สิทธิชัย แสงจู', position: 'เจ้าของ', dept: 'Administration', status: 'Active' },
                        { id: 2, code: 'EMP002', name: 'ณัฐพงษ์', position: 'ผู้จัดการฝ่าย', dept: 'Sales', status: 'Active' }
                    ],
                    customer: [
                        { id: 'CST001', code: 'C-AMATA-01', name: 'บริษัท อมตะอุตสาหกรรม จำกัด', phone: '038-999888', email: 'wipa@amata-ind.co.th', creditterm: '30 Days', status: 'Active' },
                        { id: 'CST002', code: 'C-THAIRUNG', name: 'บจก. ไทยรุ่งเรือง โลจิสติกส์', phone: '02-3334444', email: 'kitti@thairung.co.th', creditterm: '45 Days', status: 'Active' }
                    ],
                    product: [
                        { id: 'PRD001', sku: 'IT-NB-001', name: 'Notebook ASUS ExpertBook B1', category: 'IT', cost: 18500, price: 24900, minstock: 5, status: 'Active' },
                        { id: 'PRD006', sku: 'CAM-IP-01', name: 'กล้อง IP Camera Hikvision 4MP', category: 'Camera', cost: 1200, price: 1890, minstock: 15, status: 'Active' }
                    ],
                    quotation: [
                        { id: 'QT2026-001', date: '2024-01-10', customer: 'CST001', sales: 'EMP002', amount: 79439.25, vat: 5560.75, total: 85000, status: 'Approved' },
                        { id: 'QT2026-002', date: '2024-01-11', customer: 'CST002', sales: 'EMP003', amount: 299065.42, vat: 20934.58, total: 320000, status: 'Approved' }
                    ],
                    salesorder: [
                        { id: 'SO2026-001', quotation: 'QT2026-001', customer: 'CST001', orderdate: '2024-01-12', deldate: '2024-01-27', total: 85000, status: 'Approved' },
                        { id: 'SO2026-002', quotation: 'QT2026-002', customer: 'CST002', orderdate: '2024-01-13', deldate: '2024-01-28', total: 320000, status: 'Approved' }
                    ],
                    invoice: [
                        { id: 'INV-26001', dono: 'DO-26001', customer: 'CST001', date: '2024-01-10', duedate: '2024-02-09', amount: 2500, vat: 175, total: 2675, status: 'Paid' },
                        { id: 'INV-26002', dono: 'DO-26002', customer: 'CST002', date: '2024-01-14', duedate: '2024-02-13', amount: 850, vat: 59.5, total: 909.5, status: 'Unpaid' }
                    ],
                    stockin: [
                        { id: 'STI-001', product: 'PRD001', ref: 'GR2026-001', qty: 5, cost: 18500, date: '2024-01-12' },
                        { id: 'STI-002', product: 'PRD006', ref: 'GR2026-002', qty: 15, cost: 1200, date: '2024-01-12' }
                    ],
                    workorder: [
                        { id: 'WO26-001', customer: 'CST001', jobtype: 'Installation', assigned: 'EMP001', startdate: '2024-01-12', enddate: '2024-01-14', status: 'In Progress' },
                        { id: 'WO26-002', customer: 'CST002', jobtype: 'Maintenance', assigned: 'EMP005', startdate: '2024-01-13', enddate: '2024-01-13', status: 'Pending' }
                    ]
                };
                setAllData(sampleData);
            }, []);

            const modules = {
                dashboard: { label: '📊 Dashboard', icon: '📊' },
                customer: { label: '👥 ลูกค้า', icon: '👥', fields: ['code', 'name', 'phone', 'email', 'creditterm', 'status'] },
                product: { label: '📦 สินค้า', icon: '📦', fields: ['sku', 'name', 'category', 'cost', 'price', 'minstock', 'status'] },
                quotation: { label: '📋 ใบเสนอราคา', icon: '📋', fields: ['id', 'date', 'customer', 'sales', 'amount', 'vat', 'total', 'status'] },
                salesorder: { label: '🛒 ใบสั่งซื้อ', icon: '🛒', fields: ['id', 'quotation', 'customer', 'orderdate', 'deldate', 'total', 'status'] },
                invoice: { label: '💰 ใบแจ้งหนี้', icon: '💰', fields: ['id', 'dono', 'customer', 'date', 'duedate', 'amount', 'vat', 'total', 'status'] },
                stockin: { label: '📥 รับสินค้า', icon: '📥', fields: ['id', 'product', 'ref', 'qty', 'cost', 'date'] },
                workorder: { label: '🔧 ใบสั่งงาน', icon: '🔧', fields: ['id', 'customer', 'jobtype', 'assigned', 'startdate', 'enddate', 'status'] },
                employee: { label: '👨‍💼 พนักงาน', icon: '👨‍💼', fields: ['code', 'name', 'position', 'dept', 'status'] },
                supplier: { label: '🏭 ผู้จัดจำหน่าย', icon: '🏭', fields: ['name', 'contact', 'phone', 'email', 'status'] }
            };

            const getDashboardMetrics = () => {
                const totalSales = allData.quotation.reduce((sum, q) => sum + (q.total || 0), 0);
                const totalCustomers = allData.customer.length;
                const totalProducts = allData.product.length;
                const totalOrders = allData.salesorder.length;
                const paidInvoices = allData.invoice.filter(inv => inv.status === 'Paid').length;
                const unpaidAmount = allData.invoice.filter(inv => inv.status !== 'Paid').reduce((sum, inv) => sum + (inv.total || 0), 0);
                return { totalSales, totalCustomers, totalProducts, totalOrders, paidInvoices, unpaidAmount };
            };

            const getFilteredData = (module) => {
                const data = allData[module] || [];
                if (!searchTerm) return data;
                return data.filter(item => 
                    JSON.stringify(item).toLowerCase().includes(searchTerm.toLowerCase())
                );
            };

            const handleSaveItem = () => {
                if (editingItem !== null) {
                    const updatedData = allData[currentModule].map((item, idx) =>
                        idx === editingItem ? formData : item
                    );
                    setAllData({ ...allData, [currentModule]: updatedData });
                } else {
                    setAllData({
                        ...allData,
                        [currentModule]: [...allData[currentModule], formData]
                    });
                }
                resetForm();
            };

            const handleDeleteItem = (index) => {
                if (confirm('ต้องการลบรายการนี้หรือไม่?')) {
                    const updatedData = allData[currentModule].filter((_, idx) => idx !== index);
                    setAllData({ ...allData, [currentModule]: updatedData });
                }
            };

            const handleEditItem = (index, item) => {
                setEditingItem(index);
                setFormData(item);
                setShowForm(true);
            };

            const resetForm = () => {
                setFormData({});
                setEditingItem(null);
                setShowForm(false);
            };

            const handleExportCSV = () => {
                const data = getFilteredData(currentModule);
                const headers = modules[currentModule]?.fields || Object.keys(data[0] || {});
                const csv = [headers.join(','), ...data.map(item => 
                    headers.map(h => `"${item[h] || ''}"`.replace(/"/g, '""')).join(',')
                )].join('\n');
                
                const link = document.createElement('a');
                link.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
                link.download = `${currentModule}_${new Date().toISOString().slice(0,10)}.csv`;
                link.click();
            };

            const metrics = getDashboardMetrics();
            const filteredData = getFilteredData(currentModule);
            const fields = modules[currentModule]?.fields || [];

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                    <div className="max-w-7xl mx-auto">
                        {/* Header */}
                        <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                            <h1 className="text-3xl font-bold text-gray-800 mb-2">🏢 ERP V3 Comprehensive System</h1>
                            <p className="text-gray-600">PK Plus - ลุงชัย ไชโย พานิช</p>
                        </div>

                        {/* Navigation */}
                        <div className="bg-white rounded-xl shadow-lg p-4 mb-6 overflow-x-auto">
                            <div className="flex gap-2 flex-wrap">
                                <button
                                    onClick={() => { setCurrentModule('dashboard'); setSearchTerm(''); }}
                                    className={`px-4 py-2 rounded-lg font-semibold transition ${
                                        currentModule === 'dashboard'
                                            ? 'bg-blue-600 text-white'
                                            : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                    }`}
                                >
                                    📊 Dashboard
                                </button>
                                {Object.entries(modules).map(([key, module]) =>
                                    key !== 'dashboard' && (
                                        <button
                                            key={key}
                                            onClick={() => { setCurrentModule(key); setSearchTerm(''); }}
                                            className={`px-4 py-2 rounded-lg font-semibold transition whitespace-nowrap ${
                                                currentModule === key
                                                    ? 'bg-blue-600 text-white'
                                                    : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                            }`}
                                        >
                                            {module.label}
                                        </button>
                                    )
                                )}
                            </div>
                        </div>

                        {/* Dashboard */}
                        {currentModule === 'dashboard' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
                                <div className="bg-white rounded-lg shadow p-6">
                                    <h3 className="text-gray-600 text-sm font-semibold mb-2">ยอดขายทั้งหมด</h3>
                                    <p className="text-3xl font-bold text-blue-600">
                                        ฿{(metrics.totalSales / 1000).toFixed(0)}K
                                    </p>
                                </div>
                                <div className="bg-white rounded-lg shadow p-6">
                                    <h3 className="text-gray-600 text-sm font-semibold mb-2">จำนวนลูกค้า</h3>
                                    <p className="text-3xl font-bold text-green-600">{metrics.totalCustomers}</p>
                                </div>
                                <div className="bg-white rounded-lg shadow p-6">
                                    <h3 className="text-gray-600 text-sm font-semibold mb-2">รวมสินค้า</h3>
                                    <p className="text-3xl font-bold text-purple-600">{metrics.totalProducts}</p>
                                </div>
                                <div className="bg-white rounded-lg shadow p-6">
                                    <h3 className="text-gray-600 text-sm font-semibold mb-2">ใบสั่งซื้อ</h3>
                                    <p className="text-3xl font-bold text-orange-600">{metrics.totalOrders}</p>
                                </div>
                                <div className="bg-white rounded-lg shadow p-6">
                                    <h3 className="text-gray-600 text-sm font-semibold mb-2">ใบแจ้งหนี้จ่ายแล้ว</h3>
                                    <p className="text-3xl font-bold text-teal-600">{metrics.paidInvoices}</p>
                                </div>
                                <div className="bg-white rounded-lg shadow p-6">
                                    <h3 className="text-gray-600 text-sm font-semibold mb-2">ยอดค้างชำระ</h3>
                                    <p className="text-3xl font-bold text-red-600">
                                        ฿{(metrics.unpaidAmount / 1000).toFixed(0)}K
                                    </p>
                                </div>
                            </div>
                        )}

                        {/* Content Area */}
                        {currentModule !== 'dashboard' && (
                            <div className="bg-white rounded-xl shadow-lg p-6">
                                {/* Action Bar */}
                                <div className="flex flex-col md:flex-row gap-4 mb-6">
                                    <div className="flex-1 relative">
                                        <Search className="absolute left-3 top-3 text-gray-400" size={18} />
                                        <input
                                            type="text"
                                            placeholder="ค้นหา..."
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                            className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                        />
                                    </div>
                                    <button
                                        onClick={() => { setEditingItem(null); setFormData({}); setShowForm(true); }}
                                        className="flex items-center gap-2 bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition whitespace-nowrap"
                                    >
                                        <Plus size={18} /> เพิ่มใหม่
                                    </button>
                                    <button
                                        onClick={handleExportCSV}
                                        className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition whitespace-nowrap"
                                    >
                                        <Download size={18} /> Export
                                    </button>
                                </div>

                                {/* Add/Edit Form Modal */}
                                {showForm && (
                                    <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                                        <div className="bg-white rounded-lg shadow-xl w-full max-w-2xl max-h-96 overflow-y-auto">
                                            <div className="sticky top-0 bg-gray-100 px-6 py-4 flex justify-between items-center border-b">
                                                <h2 className="text-lg font-bold">
                                                    {editingItem !== null ? 'แก้ไข' : 'เพิ่มใหม่'} {modules[currentModule]?.label}
                                                </h2>
                                                <button onClick={resetForm} className="text-gray-500 hover:text-gray-700">
                                                    <X size={24} />
                                                </button>
                                            </div>

                                            <div className="p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {fields.map(field => (
                                                    <div key={field}>
                                                        <label className="block text-sm font-semibold text-gray-700 mb-2 capitalize">
                                                            {field}
                                                        </label>
                                                        {field.includes('date') ? (
                                                            <input
                                                                type="date"
                                                                value={formData[field] || ''}
                                                                onChange={(e) => setFormData({ ...formData, [field]: e.target.value })}
                                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                                            />
                                                        ) : field === 'status' ? (
                                                            <select
                                                                value={formData[field] || ''}
                                                                onChange={(e) => setFormData({ ...formData, [field]: e.target.value })}
                                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                                            >
                                                                <option value="">-- เลือก --</option>
                                                                <option value="Active">Active</option>
                                                                <option value="Inactive">Inactive</option>
                                                                <option value="Pending">Pending</option>
                                                                <option value="Approved">Approved</option>
                                                                <option value="Completed">Completed</option>
                                                            </select>
                                                        ) : (
                                                            <input
                                                                type={typeof formData[field] === 'number' ? 'number' : 'text'}
                                                                value={formData[field] || ''}
                                                                onChange={(e) => setFormData({ ...formData, [field]: e.target.value })}
                                                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                                            />
                                                        )}
                                                    </div>
                                                ))}
                                            </div>

                                            <div className="sticky bottom-0 bg-gray-100 px-6 py-4 flex justify-end gap-3 border-t">
                                                <button
                                                    onClick={resetForm}
                                                    className="px-4 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition"
                                                >
                                                    ยกเลิก
                                                </button>
                                                <button
                                                    onClick={handleSaveItem}
                                                    className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"
                                                >
                                                    บันทึก
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Data Table */}
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm">
                                        <thead>
                                            <tr className="bg-gray-100 border-b">
                                                {fields.map(field => (
                                                    <th key={field} className="px-4 py-3 text-left font-semibold text-gray-700 capitalize">
                                                        {field}
                                                    </th>
                                                ))}
                                                <th className="px-4 py-3 text-left font-semibold text-gray-700">การดำเนิน</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {filteredData.map((item, idx) => (
                                                <tr key={idx} className="border-b hover:bg-gray-50">
                                                    {fields.map(field => (
                                                        <td key={field} className="px-4 py-3 text-gray-600">
                                                            {typeof item[field] === 'number' && (field.includes('cost') || field.includes('price') || field.includes('amount') || field.includes('total') || field.includes('vat'))
                                                                ? `฿${item[field]?.toLocaleString()}`
                                                                : String(item[field] || '-')}
                                                        </td>
                                                    ))}
                                                    <td className="px-4 py-3 flex gap-2">
                                                        <button
                                                            onClick={() => handleEditItem(idx, item)}
                                                            className="text-blue-600 hover:text-blue-800"
                                                        >
                                                            <Edit2 size={16} />
                                                        </button>
                                                        <button
                                                            onClick={() => handleDeleteItem(idx)}
                                                            className="text-red-600 hover:text-red-800"
                                                        >
                                                            <Trash2 size={16} />
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>

                                    {filteredData.length === 0 && (
                                        <div className="text-center py-8 text-gray-500">
                                            ไม่มีข้อมูล {modules[currentModule]?.label}
                                        </div>
                                    )}
                                </div>

                                {/* Record count */}
                                <div className="mt-4 text-sm text-gray-600">
                                    แสดง {filteredData.length} / {allData[currentModule]?.length || 0} รายการ
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.render(<ERPApp />, document.getElementById('root'));
    </script>
</body>
</html>
