<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRV Dashboard - Real-time API Integration</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans Thai', 'Bebas Neue', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Grid Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(50, 150, 200, 0.08) 25%, rgba(50, 150, 200, 0.08) 26%, transparent 27%, transparent 74%, rgba(50, 150, 200, 0.08) 75%, rgba(50, 150, 200, 0.08) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(50, 150, 200, 0.08) 25%, rgba(50, 150, 200, 0.08) 26%, transparent 27%, transparent 74%, rgba(50, 150, 200, 0.08) 75%, rgba(50, 150, 200, 0.08) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            animation: grid-move 20s linear infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes grid-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(15, 20, 40, 0.8);
            border: 2px solid #3296c8;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-section h1 {
            font-size: 36px;
            font-weight: 700;
            color: #3296c8;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .logo-section p {
            font-size: 13px;
            color: #a0a0a0;
            letter-spacing: 1px;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .lang-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .lang-btn {
            padding: 8px 14px;
            border: 2px solid #3296c8;
            background: transparent;
            color: #3296c8;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'IBM Plex Sans Thai', sans-serif;
        }

        .lang-btn:hover {
            background: #3296c8;
            color: #0a0e27;
            transform: translateY(-2px);
        }

        .lang-btn.active {
            background: #3296c8;
            color: #0a0e27;
            box-shadow: 0 0 15px rgba(50, 150, 200, 0.5);
        }

        .refresh-btn {
            padding: 8px 14px;
            border: 2px solid #00ff64;
            background: transparent;
            color: #00ff64;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .refresh-btn:hover {
            background: #00ff64;
            color: #0a0e27;
        }

        .refresh-btn.loading {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Status Badge */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(0, 255, 100, 0.2);
            color: #00ff64;
            border: 1px solid #00ff64;
        }

        .status-badge.loading {
            background: rgba(255, 200, 0, 0.2);
            color: #ffc800;
            border-color: #ffc800;
        }

        .status-badge.error {
            background: rgba(255, 50, 50, 0.2);
            color: #ff3232;
            border-color: #ff3232;
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Card Styles */
        .card {
            background: rgba(20, 30, 50, 0.9);
            border: 2px solid #3296c8;
            border-radius: 8px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            min-height: 200px;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(50, 150, 200, 0.2), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .card:hover {
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(50, 150, 200, 0.4);
            transform: translateY(-5px);
        }

        .card-title {
            font-size: 13px;
            color: #a0a0a0;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .card-value {
            font-size: 42px;
            font-weight: 700;
            color: #00d4ff;
            margin-bottom: 10px;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px;
        }

        .card-subtitle {
            font-size: 12px;
            color: #7a7a7a;
            margin-bottom: 15px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(50, 150, 200, 0.2);
            font-size: 13px;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #a0a0a0;
        }

        .stat-value {
            color: #00d4ff;
            font-weight: 600;
        }

        /* Alert Badges */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        .badge.normal {
            background: rgba(0, 255, 100, 0.2);
            color: #00ff64;
            border: 1px solid #00ff64;
        }

        .badge.warning {
            background: rgba(255, 200, 0, 0.2);
            color: #ffc800;
            border: 1px solid #ffc800;
        }

        .badge.critical {
            background: rgba(255, 50, 50, 0.2);
            color: #ff3232;
            border: 1px solid #ff3232;
        }

        /* Large Cards */
        .large-card {
            grid-column: span 1;
        }

        @media (min-width: 1200px) {
            .large-card {
                grid-column: span 2;
            }
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #5a5a5a;
            font-size: 12px;
        }

        .timestamp {
            color: #3296c8;
            margin-top: 5px;
        }

        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(50, 150, 200, 0.1), rgba(50, 150, 200, 0.3), rgba(50, 150, 200, 0.1));
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
            height: 20px;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .card-value {
                font-size: 32px;
            }

            header {
                flex-direction: column;
                text-align: center;
            }

            .logo-section h1 {
                font-size: 28px;
            }

            .lang-selector {
                justify-content: center;
                gap: 6px;
            }

            .lang-btn {
                padding: 6px 10px;
                font-size: 11px;
            }
        }

        .error-message {
            background: rgba(255, 50, 50, 0.1);
            border: 2px solid #ff3232;
            border-radius: 8px;
            padding: 15px;
            color: #ff9999;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header with Controls -->
        <header>
            <div class="logo-section">
                <h1 id="title">🎯 HRV DASHBOARD</h1>
                <p id="subtitle">LUNGCHAI INDUSTRY CO., LTD.</p>
            </div>
            <div class="header-controls">
                <button class="refresh-btn" onclick="manualRefresh()" id="refreshBtn">
                    🔄 <span id="refreshText">REFRESH</span>
                </button>
                <div class="lang-selector">
                    <button class="lang-btn active" onclick="switchLang('th')">🇹🇭 ไทย</button>
                    <button class="lang-btn" onclick="switchLang('zh')">🇨🇳 中文</button>
                    <button class="lang-btn" onclick="switchLang('my')">🇲🇲 မြန်မာ</button>
                    <button class="lang-btn" onclick="switchLang('vi')">🇻🇳 Tiếng Việt</button>
                    <button class="lang-btn" onclick="switchLang('en')">🇬🇧 English</button>
                </div>
            </div>
        </header>

        <!-- Error Message -->
        <div id="errorContainer"></div>

        <!-- Dashboard Grid -->
        <div class="dashboard-grid" id="dashboardGrid">
            <div class="card"><div class="skeleton"></div></div>
            <div class="card"><div class="skeleton"></div></div>
            <div class="card"><div class="skeleton"></div></div>
        </div>

        <!-- Footer -->
        <footer>
            <div id="lastUpdateText">📊 Real-time Data from API</div>
            <div class="timestamp" id="timestamp">Loading...</div>
            <div style="margin-top: 10px; color: #3296c8;" id="apiStatus">
                <span class="status-badge loading" id="statusBadge">🔄 Connecting to API...</span>
            </div>
        </footer>

    </div>

    <script>
        // Language Translations
        const translations = {
            th: {
                title: '🎯 HRV DASHBOARD',
                subtitle: 'LUNGCHAI INDUSTRY CO., LTD.',
                refreshText: 'REFRESH',
                lastUpdateText: '📊 ข้อมูลแบบเรียลไทม์จาก API'
            },
            zh: {
                title: '🎯 人力资源仪表板',
                subtitle: '隆柴工业有限公司',
                refreshText: '刷新',
                lastUpdateText: '📊 来自 API 的实时数据'
            },
            my: {
                title: '🎯 လုံးစုံ​အဆင့်မြင့်သူများ',
                subtitle: 'LUNGCHAI ​ လုပ်ငန်းမှုကြီးတင်း​',
                refreshText: 'အဆင့်မြင့်သူများ',
                lastUpdateText: '📊 API မှ လောင်းတစ်သုံးရြောင်းအချက်အလက်'
            },
            vi: {
                title: '🎯 BẢN ĐIỀU KHIỂN HRV',
                subtitle: 'CÔNG TY CỔ PHẦN CÔNG NGHIỆP LUNGCHAI',
                refreshText: 'LÀM MỚI',
                lastUpdateText: '📊 Dữ liệu thời gian thực từ API'
            },
            en: {
                title: '🎯 HRV DASHBOARD',
                subtitle: 'LUNGCHAI INDUSTRY CO., LTD.',
                refreshText: 'REFRESH',
                lastUpdateText: '📊 Real-time Data from API'
            }
        };

        // Global Variables
        let apiData = null;
        let currentLanguage = 'th';
        let isLoading = false;

        // API Endpoint (ใช้ relative path)
        const API_URL = './hrv_api_data.json';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            const savedLang = localStorage.getItem('preferredLang') || 'th';
            currentLanguage = savedLang;
            switchLang(savedLang);
            
            // Initial fetch
            fetchAPIData();
            
            // Auto refresh every 5 seconds
            setInterval(fetchAPIData, 5000);
        });

        // Fetch API Data
        async function fetchAPIData() {
            if (isLoading) return;
            
            isLoading = true;
            updateStatusBadge('loading');
            
            try {
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }
                
                apiData = await response.json();
                
                // Update dashboard
                renderDashboard();
                updateStatusBadge('success');
                showError(null);
                
            } catch (error) {
                console.error('API Fetch Error:', error);
                updateStatusBadge('error');
                showError(`⚠️ API Connection Error: ${error.message}`);
            } finally {
                isLoading = false;
                updateTimestamp();
            }
        }

        // Render Dashboard
        function renderDashboard() {
            if (!apiData) return;

            const grid = document.getElementById('dashboardGrid');
            grid.innerHTML = '';

            const cards = createCardElements();
            cards.forEach(card => grid.appendChild(card));
        }

        // Create Card Elements
        function createCardElements() {
            const cards = [];

            // Card 1: Total Employees
            cards.push(createCard(
                getTranslation('👥 พนักงานทั้งหมด', '👥 员工总数', '👥 အလုံးစုံ​အဆင့်မြင့်သူများ', '👥 Tổng cộng nhân viên', '👥 Total Employees'),
                apiData.summary.totalEmployees,
                getTranslation('ทั้งหมด ณ วันนี้', '截至今日', 'ယနေ့စက်ဆင့်', 'Tính đến ngày hôm nay', 'As of today')
            ));

            // Card 2: Thai Employees
            cards.push(createCard(
                getTranslation('🇹🇭 พนักงานไทย', '🇹🇭 泰国员工', '🇹🇭 ထိုင်းလူမှုကောင်းမွန်', '🇹🇭 Nhân viên Thái', '🇹🇭 Thai Staff'),
                apiData.summary.employeesByNationality.thai,
                getTranslation(`${Math.round((apiData.summary.employeesByNationality.thai / apiData.summary.totalEmployees) * 100)}% ของพนักงาน`, `${Math.round((apiData.summary.employeesByNationality.thai / apiData.summary.totalEmployees) * 100)}% 的员工`, `${Math.round((apiData.summary.employeesByNationality.thai / apiData.summary.totalEmployees) * 100)}% အလုံးစုံ​`, `${Math.round((apiData.summary.employeesByNationality.thai / apiData.summary.totalEmployees) * 100)}% tổng nhân viên`, `${Math.round((apiData.summary.employeesByNationality.thai / apiData.summary.totalEmployees) * 100)}% of workforce`)
            ));

            // Card 3: Foreign Workers
            const foreignWorkerCard = document.createElement('div');
            foreignWorkerCard.className = 'card large-card';
            foreignWorkerCard.innerHTML = `
                <div class="card-title">${getTranslation('🌏 แรงงานต่างชาติ', '🌏 外籍员工', '🌏 နိုင်ငံတကာ​အလုံးစုံ', '🌏 Lao động nước ngoài', '🌏 Foreign Workers')}</div>
                <div style="margin-top: 10px;">
                    <div class="stat-row">
                        <span class="stat-label">🇨🇳 ${getTranslation('จีน', '中国', 'တရုတ်', 'Trung Quốc', 'China')}</span>
                        <span class="stat-value">${apiData.summary.employeesByNationality.chinese} ${getTranslation('คน', '人', 'ဦ', 'người', 'people')}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">🇲🇲 ${getTranslation('พม่า', '缅甸', 'မြန်မာ', 'Myanmar', 'Myanmar')}</span>
                        <span class="stat-value">${apiData.summary.employeesByNationality.myanmar} ${getTranslation('คน', '人', 'ဦ', 'người', 'people')}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">🇻🇳 ${getTranslation('เวียดนาม', '越南', 'ဗီယက်နမ်', 'Việt Nam', 'Vietnam')}</span>
                        <span class="stat-value">${apiData.summary.employeesByNationality.vietnam} ${getTranslation('คน', '人', 'ဦ', 'người', 'people')}</span>
                    </div>
                </div>
            `;
            cards.push(foreignWorkerCard);

            // Card 4: Attendance Status
            cards.push(createCard(
                getTranslation('📍 มาทำงาน', '📍 出勤', '📍 လုပ်ငန်းမှုတွေ့ယုံ', '📍 Đi làm', '📍 Present Today'),
                apiData.summary.attendanceToday.present,
                getTranslation(`${Math.round((apiData.summary.attendanceToday.present / apiData.summary.totalEmployees) * 100)}% บริหารได้ดี`, `${Math.round((apiData.summary.attendanceToday.present / apiData.summary.totalEmployees) * 100)}% 管理良好`, `${Math.round((apiData.summary.attendanceToday.present / apiData.summary.totalEmployees) * 100)}% ကောင်းမွန်စွာ`, `${Math.round((apiData.summary.attendanceToday.present / apiData.summary.totalEmployees) * 100)}% quản lý tốt`, `${Math.round((apiData.summary.attendanceToday.present / apiData.summary.totalEmployees) * 100)}% well managed`)
            ));

            // Card 5: Absent
            cards.push(createCard(
                getTranslation('⛔ ขาดงาน', '⛔ 缺席', '⛔ ပျက်မွေ့', '⛔ Vắng mặt', '⛔ Absent'),
                apiData.summary.attendanceToday.absent,
                getTranslation('ต้องดูแล', '需要关注', 'အလည်ကြည့်စောင့်', 'cần chú ý', 'needs attention')
            ));

            // Card 6: On Leave
            cards.push(createCard(
                getTranslation('🏥 ลางาน', '🏥 请假', '🏥 အခွင့်အရာ', '🏥 Xin phép', '🏥 On Leave'),
                apiData.summary.attendanceToday.onLeave,
                getTranslation('ทำงาน/ป่วย/กิจ', '工作/生病/人事', 'လုပ်ငန်း/နာမ/တစ်ခြား', 'Công việc/Ốm/Cá nhân', 'Work/Sick/Personal')
            ));

            // Card 7: Foreign Worker Documents
            const foreignDocCard = document.createElement('div');
            foreignDocCard.className = 'card large-card';
            const normal = apiData.foreignWorkers.filter(f => f.status === 'normal').length;
            const warning = apiData.foreignWorkers.filter(f => f.status === 'warning').length;
            const critical = apiData.foreignWorkers.filter(f => f.status === 'critical').length;
            
            foreignDocCard.innerHTML = `
                <div class="card-title">${getTranslation('📋 สถานะเอกสารแรงงานต่างชาติ', '📋 外籍员工文件状态', '📋 နိုင်ငံတကာ​류cuments​အနေအထားမာန', '📋 Tình trạng tài liệu lao động nước ngoài', '📋 Foreign Worker Document Status')}</div>
                <div style="margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap;">
                    <div>
                        <span class="badge normal">${getTranslation('✅ ปกติ', '✅ 正常', '✅ ပုံမှန်', '✅ Bình thường', '✅ Normal')}</span><br>
                        <strong style="color: #00ff64; font-size: 18px;">${normal} / ${apiData.foreignWorkers.length}</strong>
                    </div>
                    <div>
                        <span class="badge warning">${getTranslation('⚠️ ใกล้หมด', '⚠️ 即将到期', '⚠️ ကျောက်နီ', '⚠️ Sắp hết hạn', '⚠️ Near Expiry')}</span><br>
                        <strong style="color: #ffc800; font-size: 18px;">${warning} / ${apiData.foreignWorkers.length}</strong>
                    </div>
                    <div>
                        <span class="badge critical">${getTranslation('🔴 หมดอายุ', '🔴 已过期', '🔴 သုံးဆုံး', '🔴 Hết hạn', '🔴 Expired')}</span><br>
                        <strong style="color: #ff3232; font-size: 18px;">${critical} / ${apiData.foreignWorkers.length}</strong>
                    </div>
                </div>
            `;
            cards.push(foreignDocCard);

            // Card 8: Payroll Summary
            const payrollCard = document.createElement('div');
            payrollCard.className = 'card large-card';
            payrollCard.innerHTML = `
                <div class="card-title">${getTranslation('💰 สรุปเงินเดือนประจำเดือน', '💰 月工资汇总', '💰 လစ်စဉ်လုံးစုံ​ငွေ', '💰 Tóm tắt lương tháng', '💰 Monthly Payroll Summary')}</div>
                <div style="margin-top: 12px;">
                    <div class="stat-row">
                        <span class="stat-label">${getTranslation('เงินเดือนรวม', '总工资', 'အလုံးစုံ​လစ်စဉ်', 'Tổng lương', 'Total Salary')}</span>
                        <span class="stat-value">฿${apiData.summary.payrollCurrentMonth.baseSalary.toLocaleString()}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">${getTranslation('OT รวม', '加班总额', 'သင့်တင့်ငွေ', 'Tổng cộng tăng ca', 'Total OT')}</span>
                        <span class="stat-value">฿${apiData.summary.payrollCurrentMonth.totalOTPay.toLocaleString()}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">${getTranslation('ประกันสังคม', '社会保险', 'မှုကြီးတင်း', 'BHXH', 'SSO')}</span>
                        <span class="stat-value">฿${apiData.summary.payrollCurrentMonth.totalSSO.toLocaleString()}</span>
                    </div>
                    <div class="stat-row" style="border-bottom: 2px solid #3296c8;">
                        <span class="stat-label">${getTranslation('สุทธิจ่าย', '净付款', 'အင်္ဂါ​ငွေ', 'Thanh toán ròng', 'Net Payment')}</span>
                        <span class="stat-value" style="color: #00ff64;">฿${apiData.summary.payrollCurrentMonth.totalNetPayment.toLocaleString()}</span>
                    </div>
                </div>
            `;
            cards.push(payrollCard);

            // Card 9: Tax Information
            const taxCard = document.createElement('div');
            taxCard.className = 'card large-card';
            const taxHTML = apiData.tax.filings.map(filing => {
                const statusBadgeClass = filing.status === 'submitted' ? 'normal' : 'warning';
                const statusText = filing.status === 'submitted' 
                    ? getTranslation('✅ ส่งแล้ว', '✅ 已提交', '✅ ပေးလွှတ်၌', '✅ Đã nộp', '✅ Submitted')
                    : getTranslation(`⚠️ ส่งวันที่ ${filing.daysLeft}`, `⚠️ ${filing.daysLeft}日提交`, `⚠️ နံပတ်တုံးမှာ​`, `⚠️ Nộp ngày ${filing.daysLeft}`, `⚠️ Submit ${filing.daysLeft}`);
                
                return `
                    <div class="stat-row">
                        <span class="stat-label">${filing.formCode} (${filing.formName})</span>
                        <span class="badge ${statusBadgeClass}">${statusText}</span>
                    </div>
                `;
            }).join('');

            taxCard.innerHTML = `
                <div class="card-title">${getTranslation('🏛️ ภาษีและการส่ง', '🏛️ 税收和提交', '🏛️ အခွင့်အရာ၏ အခကြေးခ', '🏛️ Thuế và nộp tờ khai', '🏛️ Tax & Filing')}</div>
                <div style="margin-top: 12px;">
                    ${taxHTML}
                </div>
            `;
            cards.push(taxCard);

            return cards;
        }

        // Create Card Helper
        function createCard(title, value, subtitle) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-title">${title}</div>
                <div class="card-value">${value}</div>
                <div class="card-subtitle">${subtitle}</div>
            `;
            return card;
        }

        // Get Translation
        function getTranslation(th, zh, my, vi, en) {
            const map = { th, zh, my, vi, en };
            return map[currentLanguage] || th;
        }

        // Switch Language
        function switchLang(lang) {
            currentLanguage = lang;
            
            // Update active button
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Update header
            document.getElementById('title').textContent = translations[lang].title;
            document.getElementById('subtitle').textContent = translations[lang].subtitle;
            document.getElementById('refreshText').textContent = translations[lang].refreshText;
            document.getElementById('lastUpdateText').textContent = translations[lang].lastUpdateText;

            // Re-render dashboard
            if (apiData) {
                renderDashboard();
            }

            // Store preference
            localStorage.setItem('preferredLang', lang);
        }

        // Manual Refresh
        function manualRefresh() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('loading');
            fetchAPIData().then(() => {
                btn.classList.remove('loading');
            });
        }

        // Update Status Badge
        function updateStatusBadge(status) {
            const badge = document.getElementById('statusBadge');
            if (status === 'success') {
                badge.textContent = '✅ API Connected';
                badge.className = 'status-badge';
            } else if (status === 'loading') {
                badge.textContent = '🔄 Connecting...';
                badge.className = 'status-badge loading';
            } else if (status === 'error') {
                badge.textContent = '❌ API Error';
                badge.className = 'status-badge error';
            }
        }

        // Update Timestamp
        function updateTimestamp() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            const dateStr = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
            document.getElementById('timestamp').textContent = dateStr;
        }

        // Show Error
        function showError(message) {
            const container = document.getElementById('errorContainer');
            if (message) {
                container.innerHTML = `<div class="error-message">${message}</div>`;
            } else {
                container.innerHTML = '';
            }
        }

        // Update timestamp every second
        setInterval(updateTimestamp, 1000);
    </script>

</body>
</html>
